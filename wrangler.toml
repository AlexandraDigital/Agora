name = "agora-e65"
main = "workers/index.js"
compatibility_date = "2024-01-01"

[env.production]
routes = [
  { pattern = "agora-e65.pages.dev/api/*", zone_name = "example.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "agora"
database_id = "agora-db-id"

[build]
command = "npm run build"
cwd = "./"
