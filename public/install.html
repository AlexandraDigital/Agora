<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3c5a">
    <meta name="description" content="Install Agora - Algorithm-free social network">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Install Agora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 40px;
        }
        
        .logo img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }
        
        h1 {
            font-size: 2.5em;
            color: #1e3c5a;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .tagline {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .install-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 600;
            display: none;
        }
        
        .install-btn.visible {
            display: block;
        }
        
        .install-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }
        
        .install-btn:active {
            transform: translateY(0);
        }
        
        .success {
            display: none;
            margin-top: 20px;
            padding: 15px 20px;
            background: #e8f5e9;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            font-weight: 600;
            font-size: 1em;
        }
        
        .success.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/agora_logo.png" alt="Agora Logo">
        </div>
        
        <h1>Agora</h1>
        <p class="tagline">A public square without the algorithm</p>
        
        <button class="install-btn" id="installBtn">📱 Install to Home Screen</button>
        
        <div class="success" id="success">✓ App installed successfully!</div>
    </div>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => {
                console.log('Service worker registration failed:', err);
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const success = document.getElementById('success');

        // Listen for the install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('visible');
        });

        // Handle install button click
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    success.classList.add('show');
                    setTimeout(() => {
                        success.classList.remove('show');
                    }, 4000);
                }
                
                deferredPrompt = null;
            }
        });

        // Hide button if already installed
        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('visible');
        });
    </script>
</body>
</html>
